name: PR Verification

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to verify"
        required: true
        type: number

concurrency:
  group: pr-verify-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  verify-pr:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
      pull-requests: write
      statuses: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed routes
        id: changes
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          ROUTES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'src/app/**/page.tsx' 'src/app/page.tsx' \
            | awk '{
                sub(/^src\/app/, "");
                sub(/\/page\.tsx$/, "");
                if ($0 == "") print "/";
                else print $0;
              }' \
            | sort -u \
            | paste -sd ',' -)
          if [ -z "$ROUTES" ]; then
            echo "No page.tsx files changed in this PR. Skipping Argus verification."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed routes: $ROUTES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "routes=$ROUTES" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Vercel Preview
        if: steps.changes.outputs.has_changes == 'true'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300

      - name: Run Argus verification
        if: steps.changes.outputs.has_changes == 'true'
        uses: desplega-ai/argus-action@main
        with:
          scenario: pr-verify
          base_url: ${{ steps.vercel.outputs.url }}
          fail_on: never
          extra_vars: |
            {"CHANGED_ROUTES": "${{ steps.changes.outputs.routes }}"}
          prompt_template: |
            You are running a fast smoke check on PR #${PR_NUMBER} in ${REPO} (commit ${COMMIT_SHA})
            against the Vercel preview at ${BASE_URL}.

            Scope: only the routes added or modified in this PR. Do NOT audit the rest of the app.

            Routes changed in this PR (comma-separated): ${CHANGED_ROUTES}

            For EVERY changed route you MUST:
              1. Navigate to ${BASE_URL}<route>.
              2. Confirm the page renders without JavaScript errors or obviously broken layout.
              3. Exercise each primary interactive control (button, form field, modal trigger, etc.) once.
              4. Capture at least one screenshot of the route in its final state. If the route exposes
                 distinct UI states (e.g. a modal open vs. closed), capture a screenshot per state.

            Keep it short — this is a smoke check, not a full regression suite. Stop as soon as every
            changed route has been covered.

            Report format (this is the PR comment body — follow it strictly):

              ## Summary
              <one-line overall result>

              ## Per-route results
              For EACH route, output a section like:

              ### `<route>` — PASS | FAIL
              - Observation: <one line>
              - Interactions exercised: <short list>
              - Console errors: <none | describe>
              - Screenshots:
                ![<route> — <state>](<screenshot_url>)

              ## Overall: PASS | FAIL

            Hard requirements for the report:
              - Every route section MUST embed at least one screenshot using the `![alt](url)`
                markdown image syntax with the URL produced by the screenshot tool.
              - If you could not capture a screenshot for a route, mark that route FAIL and explain
                why in the Observation line.
              - Do not omit the screenshots section even for passing routes.
        env:
          ARGUS_API_KEY: ${{ secrets.ARGUS_API_KEY }}
