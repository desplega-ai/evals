name: PR Verification

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to verify"
        required: true
        type: number

concurrency:
  group: pr-verify-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  verify-pr:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
      pull-requests: write
      statuses: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for diff analysis

      - name: Check PR approval status
        id: approval
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # REVIEW_DECISION=$(gh pr view ${{ github.event.pull_request.number || inputs.pr_number }} --json reviewDecision -q '.reviewDecision')
          # echo "Review decision: $REVIEW_DECISION"
          # if [ "$REVIEW_DECISION" != "APPROVED" ]; then
          #   echo "PR is not approved yet. Skipping verification."
          #   echo "approved=false" >> $GITHUB_OUTPUT
          # else
          #   echo "approved=true" >> $GITHUB_OUTPUT
          # fi
          # For demonstration purposes, we will assume all PRs are approved.
          echo "approved=true" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.approval.outputs.approved == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        if: steps.approval.outputs.approved == 'true'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Claude CLI Installation
        if: steps.approval.outputs.approved == 'true'
        run: |
          claude --version || (echo "Claude CLI installation failed" && exit 1)

      - name: Install qa-use plugin and CLI
        if: steps.approval.outputs.approved == 'true'
        run: |
          claude plugin marketplace add desplega-ai/qa-use
          claude plugin install qa-use@desplega.ai
          npm install -g @desplega.ai/qa-use

      - name: Write CI-specific Claude instructions
        if: steps.approval.outputs.approved == 'true'
        run: |
          cat >> CLAUDE.md << 'CIEOF'

          ## CI/CD Runner Instructions (Auto-generated)

          You are running in CI with `--print` mode. Follow these rules strictly:

          - **NEVER use `run_in_background: true`** when calling the Task tool. ALL tasks MUST run in the foreground. Background tasks are killed when `--print` mode exits.
          - **NEVER use `run_in_background: true`** for ANY tool call. This is a non-interactive environment.
          - Execute all steps sequentially and wait for each to complete before proceeding.
          - Do not attempt interactive user prompts — make autonomous decisions.
          - If a step fails, report the failure and continue to the next step where possible.
          CIEOF

      - name: Wait for Vercel Preview
        if: steps.approval.outputs.approved == 'true'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300

      - name: Run PR Verification
        if: steps.approval.outputs.approved == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          QA_USE_API_KEY: ${{ secrets.QA_USE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        run: |
          # Run Claude Code with the verify-pr command using Vercel preview URL
          claude --print --verbose --dangerously-skip-permissions --output-format stream-json --model sonnet "/qa-use:verify-pr #${{ github.event.pull_request.number || inputs.pr_number }} --base-url ${{ steps.vercel.outputs.url }}" 2>&1 | jq -c 'select(.type == "assistant" or .type == "tool_use" or .type == "result")'

      - name: Verify report was generated
        if: steps.approval.outputs.approved == 'true'
        run: |
          REPORT="/tmp/pr-verify-report-${{ github.event.pull_request.number || inputs.pr_number }}.md"
          if [ ! -f "$REPORT" ]; then
            echo "::error::Verification report was not generated at $REPORT"
            echo "This usually means Claude Code exited before completing verification."
            echo "Check the 'Run PR Verification' step logs for details."
            exit 1
          fi
          echo "Report generated successfully:"
          wc -l "$REPORT"

      - name: Post Report to PR
        if: always() && steps.approval.outputs.approved == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/pr-verify-report-${{ github.event.pull_request.number || inputs.pr_number }}.md ]; then
            gh pr comment ${{ github.event.pull_request.number || inputs.pr_number }} \
              --body-file /tmp/pr-verify-report-${{ github.event.pull_request.number || inputs.pr_number }}.md
          fi

      - name: Upload Verification Artifacts
        if: always() && steps.approval.outputs.approved == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-verification-${{ github.event.pull_request.number || inputs.pr_number }}
          path: |
            /tmp/pr-verify-*.png
            /tmp/pr-verify-*.json
            /tmp/pr-verify-*.jsonl
            /tmp/pr-verify-*.log
            /tmp/pr-verify-report-*.md
